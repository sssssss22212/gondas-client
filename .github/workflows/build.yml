name: Build GondasClient

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8'
        cache: 'gradle'
    
    - name: Grant execute permission
      run: chmod +x gradlew || true
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build mod
      run: |
        ./gradlew build --no-daemon --stacktrace 2>&1 || gradle build --no-daemon --stacktrace 2>&1 || echo "Trying alternative build..."
    
    - name: List build output
      run: ls -la build/libs/ || echo "Checking other locations..." && find . -name "*.jar" -type f 2>/dev/null
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: GondasClient-JAR
        path: |
          build/libs/*.jar
          **/build/libs/*.jar
        if-no-files-found: warn
        retention-days: 30
